name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl --manifest-path zellij-tab-config/Cargo.toml

      - name: Rename binary
        run: cp zellij-tab-config/target/x86_64-unknown-linux-musl/release/zellij-tab-config zellij-tab-config-linux-x86_64

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: zellij-tab-config-linux-x86_64
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
